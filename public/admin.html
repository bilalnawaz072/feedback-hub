<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vouch admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root { --paper:#f7f4ec; --ink:#1f2420; --forest:#2f6b4f; --line:#e2ddd0; --muted:#7a7568; --gold:#c9a227; --card:#fffdf8; --red:#b4462f; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--paper); color:var(--ink); font-family:"Inter",sans-serif; padding:32px 20px; }
  .wrap { max-width:820px; margin:0 auto; }
  h1 { font-family:"Newsreader",serif; font-weight:500; font-size:28px; }
  .muted { color:var(--muted); font-size:14px; }
  .login { max-width:360px; margin:80px auto 0; text-align:center; }
  .login input { width:100%; border:1px solid var(--line); border-radius:9px; padding:13px; font-size:15px; margin:18px 0 10px; background:var(--card); }
  button { background:var(--forest); color:#fff; border:none; border-radius:9px; padding:12px 18px; font-weight:600; cursor:pointer; font-size:14px; }
  .login button { width:100%; }
  .err { color:var(--red); font-size:13px; min-height:18px; margin-top:6px; }
  .dash { display:none; }
  .stat { font-family:"Newsreader",serif; font-size:34px; color:var(--forest); margin:8px 0 24px; }
  .row { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:18px; margin-bottom:12px; }
  .row .top { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; }
  .row .stars { color:var(--gold); font-size:14px; }
  .row .who { font-weight:600; font-size:14px; margin:2px 0 8px; }
  .row .quote { font-size:14px; line-height:1.5; color:#3a3a33; }
  .actions { display:flex; gap:8px; flex-shrink:0; }
  .btn-sm { padding:7px 12px; font-size:12px; border-radius:7px; border:1px solid var(--line); background:transparent; color:var(--ink); cursor:pointer; }
  .btn-sm.on { background:var(--forest); color:#fff; border-color:var(--forest); }
  .btn-sm.del { color:var(--red); border-color:#e6c9c0; }
  .badge { font-size:11px; font-weight:600; padding:3px 8px; border-radius:20px; }
  .badge.live { background:#e2f0e8; color:var(--forest); }
  .badge.pending { background:#f0ece0; color:var(--muted); }
  .empty { text-align:center; color:var(--muted); padding:40px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="login" id="login">
    <h1>Vouch admin</h1>
    <p class="muted">Enter your admin password.</p>
    <input type="password" id="pw" placeholder="Admin password" />
    <button id="loginBtn">Open dashboard</button>
    <div class="err" id="loginErr"></div>
  </div>
  <div class="dash" id="dash">
    <h1>Feedback</h1>
    <div class="stat" id="count">0</div>
    <div id="list"></div>
  </div>
</div>
<script>
  let token = "";
  document.getElementById("loginBtn").addEventListener("click", login);
  document.getElementById("pw").addEventListener("keydown", e => { if (e.key==="Enter") login(); });
  async function login() {
    const pw = document.getElementById("pw").value;
    const err = document.getElementById("loginErr"); err.textContent="";
    try {
      const res = await fetch("/api/admin/feedback", { headers:{Authorization:"Bearer "+pw} });
      if (res.status===401) { err.textContent="Wrong password."; return; }
      token = pw;
      render(await res.json());
      document.getElementById("login").style.display="none";
      document.getElementById("dash").style.display="block";
    } catch { err.textContent="Could not connect."; }
  }
  function esc(s){ return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
  function starRow(n){ return "★".repeat(n)+"☆".repeat(5-n); }
  function render(data) {
    document.getElementById("count").textContent = data.total + " total";
    const list = document.getElementById("list");
    if (!data.feedback.length) { list.innerHTML='<div class="empty">No feedback yet.</div>'; return; }
    list.innerHTML = data.feedback.map(f => `
      <div class="row">
        <div class="top">
          <div style="flex:1">
            <div class="stars">${starRow(f.rating)}</div>
            <div class="who">${esc(f.name)}${f.role?" — "+esc(f.role):""} <span class="badge ${f.approved?'live':'pending'}">${f.approved?'On wall':'Pending'}</span></div>
            <div class="quote">"${esc(f.message)}"</div>
          </div>
          <div class="actions">
            <button class="btn-sm ${f.approved?'on':''}" onclick="toggle(${f.id}, ${!f.approved})">${f.approved?'Unpublish':'Approve'}</button>
            <button class="btn-sm del" onclick="del(${f.id})">Delete</button>
          </div>
        </div>
      </div>`).join("");
  }
  async function reload() { const res = await fetch("/api/admin/feedback",{headers:{Authorization:"Bearer "+token}}); render(await res.json()); }
  async function toggle(id, approved) { await fetch("/api/admin/approve",{method:"POST",headers:{"Content-Type":"application/json",Authorization:"Bearer "+token},body:JSON.stringify({id,approved})}); reload(); }
  async function del(id) { if(!confirm("Delete this feedback?"))return; await fetch("/api/admin/delete",{method:"POST",headers:{"Content-Type":"application/json",Authorization:"Bearer "+token},body:JSON.stringify({id})}); reload(); }
  window.toggle = toggle; window.del = del;
</script>
</body>
</html>
